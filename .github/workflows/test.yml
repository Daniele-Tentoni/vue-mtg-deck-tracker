name: Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          cache: 'npm'
          node-version: 24
      - run: npm ci
      - name: npm audit
        run: npm audit --production
      - run: npm run format
      - run: npm run build
      - run: npm run test:e2e
